http:
  middlewares:
    authentik:
      forwardAuth:
        # Use nomad01 IP directly (Authentik is pinned to nomad01)
        # ${NOMAD01_IP} is replaced during Traefik deployment
        address: http://${NOMAD01_IP}:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-app
          - X-authentik-meta-provider

  routers:
    nomad:
      rule: "Host(`nomad.${DNS_POSTFIX}`)"
      entryPoints:
        - websecure
      service: nomad
      middlewares:
        - authentik
      tls: {}

    pihole:
      rule: "Host(`pihole.${DNS_POSTFIX}`)"
      entryPoints:
        - websecure
      service: pihole
      middlewares:
        - authentik
      tls: {}

  services:
    nomad:
      loadBalancer:
        servers:
          - url: "http://${NOMAD01_IP}:4646"
          - url: "http://${NOMAD02_IP}:4646"
          - url: "http://${NOMAD03_IP}:4646"

    pihole:
      loadBalancer:
        servers:
          - url: "http://${DNS01_IP}:80"
