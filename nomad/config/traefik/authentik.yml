http:
  middlewares:
    authentik:
      forwardAuth:
        # Use nomad01 IP directly (Authentik is pinned to nomad01)
        # ${NOMAD01_IP} is replaced during Traefik deployment
        address: http://${NOMAD01_IP}:9000/outpost.goauthentik.io/auth/traefik
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-app
          - X-authentik-meta-provider
