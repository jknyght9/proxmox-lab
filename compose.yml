# This is not designed to run all at once, but a general configuration for the project
# do not run this, run ./setup.sh.

services:
  mkdocs:
    build: ./mkdocs
    #image: squidfunk/mkdocs-material
    container_name: mkdocs
    working_dir: /
    volumes:
      - ./mkdocs.yml:/mkdocs.yml
      - ./docs:/docs
    ports:
      - 8000:8000
    command: serve -a 0.0.0.0:8000
  nomad:
    image: hashicorp/nomad:1.9
    container_name: nomad
    working_dir: /nomad
    volumes:
      - ./nomad:/nomad:z
    environment:
      NOMAD_ADDR: "${NOMAD_ADDR}"
    entrypoint: [nomad]
  packer:
    build: ./packer
    #image: hashicorp/packer:latest
    userns_mode: host  # Bypass userns-remap for volume write access
    container_name: packer
    working_dir: /packer
    volumes:
      - ./packer:/packer:z # where your packer configs are stored
      - ./packer/.config:/root/.config:z
      - ./crypto:/crypto:ro # for SSH keys if needed
      - /var/run/docker.sock:/var/run/docker.sock # if using Docker builds
    environment:
      PACKER_LOG: "1"
    stdin_open: true
    tty: true
  # NOTE: step-ca removed — CA is now provided by Vault PKI secrets engine
  terraform:
    image: hashicorp/terraform
    userns_mode: host  # Bypass userns-remap for volume write access
    container_name: terraform
    working_dir: /terraform
    volumes:
      - ./crypto:/crypto:ro
      - ./terraform:/terraform:z
      - ./logs:/logs:z
    environment:
      TF_LOG: INFO
      TF_LOG_PATH: /logs/terraform.log
  terraform-services:
    image: hashicorp/terraform
    userns_mode: host
    container_name: terraform-services
    working_dir: /services
    volumes:
      - ./crypto:/crypto:ro
      - ./terraform/services:/services:z
      - ./nomad:/nomad:ro
      - ./logs:/logs:z
    environment:
      TF_LOG: INFO
      TF_LOG_PATH: /logs/terraform-services.log
