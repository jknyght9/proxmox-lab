#cloud-config
hostname: kasm01
manage_etc_hosts: true

users:
  - name: labadmin
    groups: [sudo]
    shell: /bin/bash
    sudo: ALL=(ALL) NOPASSWD:ALL
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILNAUM5f3wscdzKVRswjztwAs8plOHhN7f9qvM5vXl57 lab-deploy

  - name: root
    ssh_authorized_keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILNAUM5f3wscdzKVRswjztwAs8plOHhN7f9qvM5vXl57 lab-deploy


packages: [curl, jq, socat, ca-certificates]

runcmd:
  - |
    cat > /root/kasm-install.sh <<'EOF'
    #!/bin/bash
    set -e
    /opt/kasm/current/bin/stop
    /root/.acme.sh/acme.sh --set-default-ca --server https://ca.jdclabs.lan/acme/acme/directory
    FQDNS="kasm01.jdclabs.lan kasm01.jdclabs.lan kasm.jdclabs.lan"
    SAN_ARGS=""
    for s in $FQDNS; do
      echo "$s" | grep -q "\." && [ "$s" != "kasm01.jdclabs.lan" ] && SAN_ARGS="$SAN_ARGS -d $s"
    done
    echo "$SAN_ARGS" > /root/.san_args
    /root/.acme.sh/acme.sh --issue --alpn -d kasm01.jdclabs.lan $(cat /root/.san_args)
    KASM_CERT_DIR=/opt/kasm/current/certs
    mkdir -p "$KASM_CERT_DIR"
    for f in kasm_nginx.crt kasm_nginx.key; do
      [ -f "$KASM_CERT_DIR/$f" ] && mv "$KASM_CERT_DIR/$f" "$KASM_CERT_DIR/$f.bak" || true
    done
    /root/.acme.sh/acme.sh --install-cert -d kasm01.jdclabs.lan \
      --key-file       /opt/kasm/current/certs/kasm_nginx.key \
      --fullchain-file /opt/kasm/current/certs/kasm_nginx.crt
    chown kasm:kasm /opt/kasm/current/certs/kasm_nginx.*
    /opt/kasm/current/bin/start || true
    EOF
    chmod +x /root/kasm-install.sh
  - |
    bash -lc '
      systemctl enable --now systemd-timesyncd || true
      systemctl restart systemd-timesyncd || true
    '
  - |
    bash -lc '
      echo "[time] waiting for NTP sync..."
      # wait up to ~60s for NTP to sync
      for i in {1..30}; do
        if timedatectl show -p NTPSynchronized --value 2>/dev/null | grep -qi yes; then
          timedatectl status || true
          break
        fi
        sleep 2
      done
    '
  - |
    bash -lc '
      grep -q "/swapfile" /etc/fstab || (fallocate -l 4G /swapfile
      chmod 600 /swapfile
      mkswap /swapfile
      swapon /swapfile
      echo "/swapfile none swap sw 0 0" >> /etc/fstab)
    '
  - |
    bash -lc '
      set -e
      export HOME=/root; cd /root; echo "HOME=$HOME PWD=$PWD"
      retry() { n=0; until "$@"; do n=$((n+1)); [ $n -ge 5 ] && return 1; sleep $((2*n)); done; }
      if [ ! -x /opt/kasm/current/bin/start ]; then
        curl -fsSLO https://kasm-static-content.s3.amazonaws.com/kasm_release_1.17.0.7f020d.tar.gz
        tar -xf kasm_release_1.17.0.7f020d.tar.gz
        cd ~/kasm_release
        retry bash install.sh --accept-eula --admin-password changeme123
      fi
    '
  - |
    bash -lc '
      export HOME=/root; cd /root; echo "HOME=$HOME PWD=$PWD"
      command -v ~/.acme.sh/acme.sh >/dev/null || (curl -fsSL https://get.acme.sh | sh -s email=admin@jdclabs.lan)
    '
  - |
    bash -lc '
      set -e
      printf "%s\n" "/opt/kasm/current/bin/stop && sleep 2 && /opt/kasm/current/bin/start" > /root/kasm-renew.sh
      chmod +x /root/kasm-renew.sh
    '
  - |
    bash -lc '
      set -e
      export HOME=/root
      /root/.acme.sh/acme.sh --install-cronjob
      (crontab -l 2>/dev/null; echo "0 3 * * * /root/.acme.sh/acme.sh --cron --home /root/.acme.sh --reloadcmd \"/root/kasm-renew.sh\"") | crontab -
    '
