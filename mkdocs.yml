site_name: Proxmox Lab
site_url: https://jknyght9.github.io/proxmox-lab
site_author: Jacob Stauffer | CISSP
site_description: >-
  An Infrastructure as Code proof of concept using Proxmox
repo_name: jknyght9/proxmox-lab
repo_url: https://github.com/jknyght9/proxmox-lab

theme:
  name: material
  #name: readthedocs
  highlightjs: true
  hljs_languages:
    - yaml
    - bash
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      clickable_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Getting Started:
      - Introduction: getting-started/introduction.md
      - Prerequisites: getting-started/prerequisites.md
      - Quick Start: getting-started/quick-start.md
      - Pre-Flight Checklist: getting-started/checklist.md
  - Architecture:
      - Overview: architecture/overview.md
      - Network Topology: architecture/network-topology.md
      - Service Relationships: architecture/service-relationships.md
      - Certificate Chain: architecture/certificate-chain.md
  - Configuration:
      - Terraform Variables: configuration/terraform-variables.md
      - Packer Variables: configuration/packer-variables.md
      - Module Reference: configuration/module-reference.md
      - Cloud-Init Templates: configuration/cloudinit-templates.md
  - Modules:
      - Docker Swarm: modules/docker-swarm.md
      - Kasm Workspaces: modules/kasm.md
      - Pihole DNS: modules/pihole.md
      - Step-CA: modules/step-ca.md
  - Operations:
      - Accessing Services: operations/accessing-services.md
      - DNS Management: operations/dns-management.md
      - Certificate Operations: operations/certificate-operations.md
      - Docker Swarm Operations: operations/docker-swarm-operations.md
      - Backup & Recovery: operations/backup-recovery.md
  - Troubleshooting:
      - Common Issues: troubleshooting/common-issues.md
      - Error Reference: troubleshooting/error-reference.md
      - Diagnostic Commands: troubleshooting/diagnostic-commands.md
      - FAQ: troubleshooting/faq.md
  - Reference:
      - Glossary: reference/glossary.md
      - External Resources: reference/external-resources.md
